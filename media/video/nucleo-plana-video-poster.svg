  </text>
  <rect x="982" y="152" width="472" height="596" rx="34" fill="url(#card)" stroke="#1B385A" stroke-width="2"/>
  <circle cx="1218" cy="355" r="106" fill="#0A1730" stroke="#244A74" stroke-width="2"/>
  <circle cx="1218" cy="355" r="74" fill="url(#play)"/>
  <path d="M1200 315L1260 355L1200 395V315Z" fill="#07101C"/>
  <rect x="1040" y="506" width="356" height="124" rx="26" fill="#142844" stroke="#244A74"/>
  <text x="1076" y="560" fill="#EEF5FF" font-family="Manrope, Arial, sans-serif" font-size="32" font-weight="700">
